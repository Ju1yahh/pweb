<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;


        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }


        .conteudo {
            display: flex;
            gap: 15px;
        }

        .sidebar {
            width: 20%;
            background-color: #e5e5e5;
            padding: 20px;
        }

        .main-content {
            width: 80%;
            background-color: #e5e5e5;
            padding: 20px;
        }

        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 8px;
            margin-top: auto;
        }

        h1{
            margin: 0;
       }
    </style>
</head>

<body>

    <div class="header">
        <h1>Minha Página Web</h1>
    </div>

    <div class="conteudo">

        <div class="sidebar">
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </div>

        <div class="main-content">
            <p>Este é o conteúdo principal da página.</p>

            <p>
                Adicione mais parágrafos ou elementos conforme necessário.
            </p>
        </div>

    </div>

    <div class="footer">
        <p>Rodapé da Página</p>
    </div>

</body>
</html>
