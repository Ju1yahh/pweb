<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <form>
        Login:<br/> 
        <input type="text" name="login"><br/>

        Senha:<br/>
        <input type="password" name="senha"><br/>
        Confirmar Senha : <br>
        <input type="password" name="Confirmar Senha"><br/>
        
        Nome : <br>
        <input type="text" name="Nome"><br/>

        Sexo : <br>
        <input type="radio" value="Masculino" name="Sexo">Masculino<br>
        <input type="radio" value="Feminino" name="Sexo">Feminino<br>

        Email : <br>
        <input type="Email" name="Email"><br><br>

        Interesses : <br>
        <input type="Checkbox" value="Futebol" name="Interesses">Futebol<br>
        <input type="Checkbox" value="Política" name="Interesses">Política<br>
        <input type="Checkbox" value="Economia" name="Interesses">Economia<br>
        <input type="Checkbox" value="Carros" name="Interesses">Carros<br>
        <input type="Checkbox" value="Celebridades" name="Interesses">Celebridades<br>

        <input type="button" value="Enviar">

        
    </form>
    <label for="cars">Choose a car:</label>

  <select name="cars" id="cars">
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="mercedes">Mercedes</option>
  <option value="audi">Audi</option>
</select>
</body>
</html>
