<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Extra</title>
    <link rel="stylesheet" href="style.css">
    <style type="text/css">

        body {
          margin: 0;
          font-family: Arial, sans-serif;
}

        .header {
          background-color: lightblue;
          height: 80px;
          text-align: center;
          line-height: 80px;
          font-weight: bold;
}

        .container {
          display: flex;
          height: 400px;
}

        .left {
          width: 25%;
          background-color: lightcoral;
          display: flex;
          justify-content: center;
          align-items: center;
}

        .center {
          width: 50%;
          background-color: lightgreen;
          display: flex;
          justify-content: center;
          align-items: center;
}

        .right {
          width: 25%;
          background-color: lightcoral;
          display: flex;
          justify-content: center;
          align-items: center;
}

        .footer {
          background-color: lightpink;
          height: 60px;
          text-align: center;
          line-height: 60px;
          font-weight: bold;
}

    </style>
</head>
<body>

    <header class="header">
        Header 100%
    </header>

    <main class="container">

        <section class="left">
            Left 25%
        </section>

        <section class="center">
            Center 50%
        </section>

        <section class="right">
            Right 25%
        </section>

    </main>

    <footer class="footer">
        Footer 100%
    </footer>

</body>
</html>
