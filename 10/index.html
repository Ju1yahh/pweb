<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formatação de links</title>

   <style>

   .menu {
       background: #EEE685;
       font-family: "Trebuchet MS", Helvetica, sans-serif;
       font-size: 18px;
       padding: 10px;

   }

   a:link { /*não visitados*/
    color: #b9c941;
    text-decoration: none;
   }

   a:visited { /*visitados*/
    color: #458B00;
   }

   a:hover { /*passar o mouse*/
    color: #8b4726;
   }

   a:hover { /*passar o mouse*/
    color: #FF1493;
   }

   a{
    text-decoration: none;
   }

   </style>

</head>

<body>

<header>
    <h1>Exemplo de tag header</h1>
</header>

<nav class="menu">

    <a href="http://www.google.com">Google</a> |
    <a href="http://www.techtudo.com.br">Tech tudo</a> |
    <a href="http://www.maujor.com">Maujor</a> |

</nav>

 </footer>
    
</body>
</html>
